name: flutter_trigger_input
description: A powerful Flutter widget for detecting and handling triggers like mentions (@), and links. Supports deletion, and flexible suggestion engines.
version: 0.3.0
repository: https://github.com/ducnt98vn/flutter_trigger_input
issue_tracker: https://github.com/ducnt98vn/flutter_trigger_input/issues

topics:
  - chat
  - mention
  - hashtag
  - textfield
  - trigger

screenshots:
  - description: "Example of mention detection."
    path: screenshots/demo.png

environment:
  sdk: ^3.8.0
  flutter: ">=3.0.0"

dependencies:
  diff_match_patch: ^0.4.1
  flutter:
    sdk: flutter
  json_annotation: ^4.8.1

dev_dependencies:
  build_runner: ^2.1.7
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter
  json_serializable: ^6.7.0
  test: ^1.26.3
