name: flutter_trigger_input
description: High-performance Flutter Rich Text Input for Mentions (@), Hashtags (#), and Links. Built on Delta Architecture with atomic deletion, custom context menus, and JSON sync.
version: 0.4.0
repository: https://github.com/ducnt98vn/flutter_trigger_input
issue_tracker: https://github.com/ducnt98vn/flutter_trigger_input/issues

topics:
  - chat
  - mentions
  - hashtag
  - rich-text
  - textfield

screenshots:
  - description: "Example of mention detection."
    path: screenshots/demo.png

environment:
  sdk: ^3.8.0
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  json_annotation: ^4.8.1

dev_dependencies:
  build_runner: ^2.1.7
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter
  json_serializable: ^6.7.0
  test: ^1.26.3
